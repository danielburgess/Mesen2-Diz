name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Restore packages
        run: dotnet restore -p:TargetFramework="net8.0" -r win-x64

      - uses: ./.github/actions/build-sha1-action

      - name: Build
        run: msbuild -nologo -v:m -clp:ForceConsoleColor -m -p:Configuration=Release -p:Platform=x64 -t:Clean,UI -p:TargetFramework="net8.0"

      - name: Publish
        run: dotnet publish --no-restore -c Release -p:PublishSingleFile="true" -p:OptimizeUi="true" -p:Platform="Any CPU" -p:TargetFramework="net8.0" -r win-x64 Mesen.sln /p:PublishProfile=UI\Properties\PublishProfiles\Release.pubxml

      - name: Zip
        run: Compress-Archive -Path build/TmpReleaseBuild/Mesen.exe -DestinationPath Mesen2-Diz-Windows-net8.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-net8
          path: Mesen2-Diz-Windows-net8.zip

  # ── Linux ─────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Install dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -qy libsdl2-dev ccache

      - uses: ./.github/actions/setup-ccache-action

      - uses: ./.github/actions/build-sha1-action

      - name: Build
        run: make -j$(nproc) -O LTO=true STATICLINK=true SYSTEM_LIBEVDEV=false

      - name: Zip
        run: zip -j Mesen2-Diz-Linux-x64.zip bin/linux-x64/Release/linux-x64/publish/Mesen

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: Mesen2-Diz-Linux-x64.zip

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "Mesen2-Diz $TAG" \
            --notes "## Mesen2-Diz $TAG

          See [README](https://github.com/${{ github.repository }}/blob/master/README.md) for feature documentation.

          ### Downloads
          | File | Platform |
          |------|----------|
          | \`Mesen2-Diz-Windows-net8.zip\` | Windows (.NET 8 required) |
          | \`Mesen2-Diz-Linux-x64.zip\` | Linux x64 |
          " \
            artifacts/*
